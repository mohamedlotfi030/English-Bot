<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المساعد اللغوي - النسخة الموسعة</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: auto; background-color: #1e293b; padding: 20px; border-radius: 16px; }
    .vocab-nav { display: flex; gap: 5px; margin-bottom: 10px; }
    .vocab-btn { background: #334155; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-size: 13px; }
    .vocab-btn.active { background: #5850ec; }
    .word-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 5px; height: 250px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 8px; }
    .word-chip { background: #1e293b; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center; border: 1px solid #334155; }
    .word-chip:hover { border-color: #5850ec; }
    .result-box { margin-top: 20px; padding: 15px; background: #0f172a; border-right: 5px solid #5850ec; direction: ltr; text-align: left; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }
    textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
    <div id="checkerSection">
        <textarea id="userInput" rows="3" placeholder="اكتب جملتك هنا..."></textarea>
        <button class="action-btn" onclick="processText()">تحليل وتصحيح</button>
        <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>
    
    <div style="margin-top:20px;">
        <div class="vocab-nav" id="levelNav"></div>
        <div id="wordList" class="word-list"></div>
    </div>
</div>

<script>
    // --- 1. القاموس الموسع ---
    const vocabData = {
        B2: ["Ambiguous", "Beneficial", "Consistent", "Establish", "Evaluate", "Fundamental", "Generate", "Hypothesis", "Implement", "Objective", "Promote", "Significant", "Sustain", "Theoretical", "Underestimate", "Apparent", "Capacity", "Challenge", "Dilemma", "Diligent", "Emerge", "Eloquent", "Framework", "Fascinating", "Genuine", "Initiative", "Inevitable", "Justify", "Knowledgeable", "Lucrative"],
        C1: ["Advocate", "Coherent", "Compromise", "Constitute", "Discrepancy", "Eloquent", "Indispensable", "Meticulous", "Pragmatic", "Redundant", "Scrutinize", "Subsequent", "Trivial", "Vulnerable", "Zealous", "Acquire", "Arbitrary", "Assert", "Convey", "Denote", "Deviate", "Emphasize", "Enhance", "Exceed", "Extract", "Fluctuate", "Hypothesize", "Illustrate", "Interpret", "Incorporate"],
        C2: ["Ephemeral", "Exacerbate", "Immutable", "Inherent", "Juxtapose", "Paradigm", "Quintessential", "Repercussion", "Superfluous", "Ubiquitous", "Unprecedented", "Vicarious", "Widespread", "Yield", "Zenith", "Abstain", "Alleviate", "Ameliorate", "Anomalous", "Apathy", "Audacious", "Benevolent", "Capricious", "Candid", "Complacent", "Conspicuous", "Delineate", "Despot", "Ebullient", "Eclectic"]
    };

    // --- 2. محرك القواعد المطور (Regex Wildcards) ---
    const grammarRules = [
        { regex: /\b(we|they)\s+is\b/gi, replacement: "$1 are" },
        { regex: /\bwent\s+.*?tomorrow\b/gi, replacement: "will go tomorrow" }, // القاعدة المحسنة
        { regex: /\bwill go\s+.*?yesterday\b/gi, replacement: "went yesterday" }
    ];

    async function processText() {
        let text = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        box.style.display = "block";
        box.innerHTML = "⏳ تحليل...";

        // تطبيق القواعد
        grammarRules.forEach(rule => text = text.replace(rule.regex, rule.replacement));

        // طلب الـ API للتحقق العميق
        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: text, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            if (data.matches && data.matches.length > 0) {
                data.matches.sort((a, b) => b.offset - a.offset).forEach(m => {
                    text = text.substring(0, m.offset) + m.replacements[0].value + text.substring(m.offset + m.length);
                });
            }
            box.innerHTML = `<strong>Correction:</strong><br>${text}`;
        } catch(e) { box.innerHTML = `<strong>Result:</strong><br>${text}`; }
    }

    // --- تهيئة الواجهة ---
    function renderWords(level) {
        document.querySelectorAll('.vocab-btn').forEach(b => b.classList.toggle('active', b.innerText === level));
        document.getElementById('wordList').innerHTML = vocabData[level].map(w => `<div class="word-chip">${w}</div>`).join('');
    }

    Object.keys(vocabData).forEach(level => {
        const btn = document.createElement('button');
        btn.className = 'vocab-btn';
        btn.innerText = level;
        btn.onclick = () => renderWords(level);
        document.getElementById('levelNav').appendChild(btn);
    });
    renderWords('B2');
</script>
</body>
</html>
