<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الإنجليزية الذكي & القاموس</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* أزرار التنقل بين التصحيح والقاموس */
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-bottom: 2px solid transparent;
            width: 50%;
        }
        .tab-btn.active {
            color: #5850ec;
            border-bottom: 2px solid #5850ec;
            font-weight: bold;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        textarea, input[type="text"] {
            width: 100%;
            background-color: #121620;
            color: #fff;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        textarea { height: 100px; resize: none; }
        input[type="text"] { height: 45px; margin-bottom: 10px; }
        
        button.action-btn {
            background-color: #5850ec;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        button.action-btn:hover { background-color: #4338ca; }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #121620;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            text-align: left;
            direction: ltr;
            display: none;
            white-space: pre-line;
        }
        .key-section {
            margin-top: 15px;
            font-size: 12px;
            color: #718096;
        }
    </style>
</head>
<body>

    <h2>مساعد تعلم الإنجليزية الذكي 🤖</h2>
    
    <div class="container">
        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">تصحِيح الجمل</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">قاموس C1 / C2</button>
        </div>

        <!-- قسم تصحيح النصوص -->
        <div id="checkerSection" class="content-section active">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">اكتب جملتك هنا للتحليل:</p>
            <textarea id="userInput" placeholder="Type a sentence here and I'll check it for mistakes..."></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze Text</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <!-- قسم قاموس المستويات المتقدمة -->
        <div id="dictionarySection" class="content-section">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">ابحث عن كلمة أو فعل متقدم:</p>
            <input type="text" id="wordInput" placeholder="Type a word (e.g., Articulate, Mitigate)...">
            <button class="action-btn" onclick="searchWord()">Search Word</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>

        <!-- إدخال الـ Token بأمان داخل المتصفح دون حظره من جيت هاب -->
        <div class="key-section">
            <p>لتشغيل الذكاء الاصطناعي، أدخل الـ Token الخاص بك هنا (يُحفظ في متصفحك فقط):</p>
            <input type="text" id="userToken" placeholder="hf_..." style="text-align:center; font-size:12px;" onchange="saveToken()">
        </div>
    </div>

    <script>
        // دالة التنقل بين التبويبات
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            if(tabName === 'checker') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('checkerSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('dictionarySection').classList.add('active');
            }
        }

        // حفظ واسترجاع الـ Token من ذاكرة المتصفح المحلية بأمان
        function saveToken() {
            localStorage.setItem('hf_token', document.getElementById('userToken').value.trim());
        }
        window.onload = function() {
            if(localStorage.getItem('hf_token')) {
                document.getElementById('userToken').value = localStorage.getItem('hf_token');
            }
        }

        // 1. دالة تصحيح النصوص
        async function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("checkerResult");
            const token = document.getElementById("userToken").value.trim();
            
            if (!token) { alert("من فضلك أدخل الـ Token الخاص بك في الصندوق السفلي أولاً!"); return; }
            if (userInput === "") { alert("من فضلك اكتب جملة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري تحليل الجملة... 🤖</p>";

            const API_URL = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct";
            const prompt = `<|begin_of_text|><|start_header_id|>system<|end_header_id|>You are an expert English teacher. Fix the user's grammar mistakes, provide an Accuracy Score (0-100%), and give an educational breakdown in simple English.<|eot_id|><|start_header_id|>user<|end_header_id|>Analyze: "${userInput}"<|eot_id|><|start_header_id|>assistant<|end_header_id|>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 200, temperature: 0.7 } })
                });
                const data = await response.json();
                if (data && data[0] && data[0].generated_text) {
                    const fullText = data[0].generated_text;
                    resultBox.innerHTML = (fullText.split("<|start_header_id|>assistant<|end_header_id|>")[1] || fullText).trim();
                } else { resultBox.innerHTML = "<p style='color:red;'>حدثت مشكلة. تأكد من صلاحية الـ Token.</p>"; }
            } catch (error) { resultBox.innerHTML = "<p style='color:red;'>فشل الاتصال بالخادم.</p>"; }
        }

        // 2. دالة القاموس المستويات المتقدمة C1/C2
        async function searchWord() {
            const wordInput = document.getElementById("wordInput").value.trim();
            const resultBox = document.getElementById("dictionaryResult");
            const token = document.getElementById("userToken").value.trim();

            if (!token) { alert("من فضلك أدخل الـ Token الخاص بك في الصندوق السفلي أولاً!"); return; }
            if (wordInput === "") { alert("من فضلك اكتب كلمة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري البحث وشرح الكلمة بأسلوب متقدم... 📚</p>";

            const API_URL = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct";
            const prompt = `<|begin_of_text|><|start_header_id|>system<|end_header_id|>You are an advanced English dictionary bot. Explain if the given word belongs to C1 or C2 level. Provide its definition, synonyms at C1/C2 level, and 2 professional example sentences.<|eot_id|><|start_header_id|>user<|end_header_id|>Explain the word: "${wordInput}"<|eot_id|><|start_header_id|>assistant<|end_header_id|>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 250, temperature: 0.3 } })
                });
                const data = await response.json();
                if (data && data[0] && data[0].generated_text) {
                    const fullText = data[0].generated_text;
                    resultBox.innerHTML = (fullText.split("<|start_header_id|>assistant<|end_header_id|>")[1] || fullText).trim();
                } else { resultBox.innerHTML = "<p style='color:red;'>تعذر العثور على الكلمة.</p>"; }
            } catch (error) { resultBox.innerHTML = "<p style='color:red;'>فشل الاتصال بالخادم.</p>"; }
        }
    </script>
</body>
</html>
