<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الإنجليزية الذكي الفعلي</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-bottom: 2px solid transparent;
            width: 50%;
        }
        .tab-btn.active {
            color: #5850ec;
            border-bottom: 2px solid #5850ec;
            font-weight: bold;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        textarea, input[type="text"] {
            width: 100%;
            background-color: #121620;
            color: #fff;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        textarea { height: 100px; resize: none; }
        input[type="text"] { height: 45px; margin-bottom: 10px; }
        
        button.action-btn {
            background-color: #5850ec;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        button.action-btn:hover { background-color: #4338ca; }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #121620;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            text-align: left;
            direction: ltr;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h2>مساعد تعلم الإنجليزية بالذكاء الاصطناعي الحقيقي 🤖</h2>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">تصحِيح الجمل</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">قاموس C1 / C2</button>
        </div>

        <div id="checkerSection" class="content-section active">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">اكتب جملتك هنا للتحليل الفوري:</p>
            <textarea id="userInput" placeholder="Type here, e.g., he go to school..."></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze Text</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <div id="dictionarySection" class="content-section">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">ابحث عن كلمة متقدمة:</p>
            <input type="text" id="wordInput" placeholder="Type a word (e.g., Mitigate, Eloquent)...">
            <button class="action-btn" onclick="searchWord()">Search Word</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            if(tabName === 'checker') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('checkerSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('dictionarySection').classList.add('active');
            }
        }

        // 1. محرك تصحيح القواعد الفوري المستقر تماماً وبدون Token
        async function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("checkerResult");
            if (userInput === "") { alert("من فضلك اكتب جملة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري تحليل القواعد وتصحيح الجملة... 🧠</p>";

            try {
                // استخدام سيرفر LanguageTool المفتوح والمخصص لتصحيح الويب مباشرة
                const response = await fetch("https://api.languagetoolplus.com/v2/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ text: userInput, language: "en-US" })
                });

                const data = await response.json();
                
                if (data.matches && data.matches.length > 0) {
                    let correctedText = userInput;
                    let explanations = [];
                    
                    // ترتيب الأخطاء من النهاية للبداية لتبديلها بشكل صحيح في النص
                    const matches = data.matches.sort((a, b) => b.offset - a.offset);
                    
                    matches.forEach(match => {
                        if (match.replacements && match.replacements.length > 0) {
                            const replacement = match.replacements[0].value;
                            correctedText = correctedText.substring(0, match.offset) + replacement + correctedText.substring(match.offset + match.length);
                            explanations.push(`- Fixed: "${userInput.substring(match.offset, match.offset + match.length)}" ➔ "${replacement}" (${match.message})`);
                        }
                    });

                    resultBox.innerHTML = `<strong>Corrected Sentence:</strong>\n<span style="color:#10b981; font-weight:bold;">${correctedText}</span>\n\n<strong>Explanation:</strong>\n${explanations.join('\n')}`;
                } else {
                    resultBox.innerHTML = `<strong>Corrected Sentence:</strong>\n<span style="color:#10b981; font-weight:bold;">${userInput}</span>\n\n✨ Perfect! No grammar mistakes found in this sentence.`;
                }
            } catch (error) {
                console.error(error);
                resultBox.innerHTML = "<p style='color:red;'>عذراً، فشل الاتصال بمحرك التصحيح المباشر. يرجى التحقق من الشبكة.</p>";
            }
        }

        // 2. محرك القاموس المتقدم المفتوح تماماً
        async function searchWord() {
            const wordInput = document.getElementById("wordInput").value.trim();
            const resultBox = document.getElementById("dictionaryResult");
            if (wordInput === "") { alert("من فضلك اكتب كلمة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري البحث في القاموس الأكاديمي... 📚</p>";

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${wordInput}`);
                if (!response.ok) throw new Error("Word not found");
                
                const data = await response.json();
                const wordData = data[0];
                
                const definition = wordData.meanings[0].definitions[0].definition;
                const example = wordData.meanings[0].definitions[0].example || "No direct example available, but highly usable in professional contexts.";
                const partOfSpeech = wordData.meanings[0].partOfSpeech;
                
                // تحديد تقريبي للمستوى بناء على طبيعة الكلمة وطولها (C1/C2) لتناسب الفكرة العامة للبرنامج
                const level = wordInput.length > 7 ? "C1 / C2 (Advanced)" : "B2 / C1 (Upper-Intermediate)";

                resultBox.innerHTML = `<strong>Word:</strong> ${wordData.word} (${partOfSpeech})\n<strong>Academic Level:</strong> ${level}\n\n<strong>Definition:</strong>\n${definition}\n\n<strong>Professional Example:</strong>\n<span style="color:#a0aec0; font-style: italic;">"${example}"</span>`;
            } catch (error) {
                resultBox.innerHTML = "<p style='color:red;'>لم يتم العثور على الكلمة، أو أن هناك مشكلة مؤقتة في سيرفر القاموس. تأكد من الإملاء.</p>";
            }
        }
    </script>
</body>
</html>
