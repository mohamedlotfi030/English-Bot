<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المساعد اللغوي المطور</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; border-right: 5px solid #5850ec; }
    .error { color: #ef4444; background: rgba(239, 68, 68, 0.2); text-decoration: underline; font-weight: bold; }
    .suggestion { color: #38bdf8; font-size: 0.9em; margin-top: 5px; }
    .audio-btn { background: #334155; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; margin: 2px; }
    .word-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 5px; margin-top: 10px; }
    .word-chip { background: #334155; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center; border: 1px solid #475569; }
  </style>
</head>
<body>

<div class="container">
    <div class="tabs">
      <button class="tab-btn active" id="btnChecker" onclick="switchTab('checker')">التصحيح المنطقي</button>
      <button class="tab-btn" id="btnDict" onclick="switchTab('dictionary')">القاموس (100 كلمة)</button>
    </div>

    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="مثال: I went to school tomorrow"></textarea>
      <button class="action-btn" onclick="processText()">تحليل الجملة</button>
      <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>

    <div id="dictionarySection" class="content-section">
      <input type="text" id="wordInput" placeholder="بحث...">
      <button class="action-btn" onclick="searchWord()">بحث وتعلم</button>
      <div id="dictionaryResult" class="result-box" style="display:none;"></div>
      <div id="wordList" class="word-list"></div>
    </div>
</div>

<script>
    // --- 1. قاعدة البيانات (100 كلمة) ---
    const words = ["Ambiguous", "Beneficial", "Consistent", "Establish", "Evaluate", "Fundamental", "Generate", "Hypothesis", "Implement", "Objective", "Promote", "Significant", "Sustain", "Theoretical", "Underestimate", "Apparent", "Capacity", "Challenge", "Dilemma", "Diligent", "Emerge", "Eloquent", "Framework", "Fascinating", "Genuine", "Initiative", "Inevitable", "Justify", "Knowledgeable", "Lucrative", "Maintain", "Neutral", "Outcome", "Perspective", "Relevant", "Advocate", "Coherent", "Compromise", "Constitute", "Discrepancy", "Indispensable", "Meticulous", "Pragmatic", "Redundant", "Scrutinize", "Subsequent", "Trivial", "Vulnerable", "Zealous", "Acquire", "Arbitrary", "Assert", "Convey", "Denote", "Deviate", "Emphasize", "Enhance", "Exceed", "Extract", "Fluctuate", "Hypothesize", "Illustrate", "Interpret", "Incorporate", "Jurisdiction", "Kinetic", "Liability", "Manifest", "Negligible", "Overt", "Ephemeral", "Exacerbate", "Immutable", "Inherent", "Juxtapose", "Paradigm", "Quintessential", "Repercussion", "Superfluous", "Ubiquitous", "Unprecedented", "Vicarious", "Widespread", "Yield", "Zenith", "Abstain", "Alleviate", "Ameliorate", "Anomalous", "Apathy", "Audacious", "Benevolent", "Capricious", "Candid", "Complacent", "Conspicuous", "Delineate", "Despot", "Ebullient", "Eclectic"];
    
    // تحميل الكلمات
    const listDiv = document.getElementById('wordList');
    words.forEach(w => {
        const div = document.createElement('div'); div.className = 'word-chip'; div.innerText = w;
        div.onclick = () => searchWord(w); listDiv.appendChild(div);
    });

    // --- 2. محرك التصحيح (Logic + Grammar) ---
    async function processText() {
        let input = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        if (!input) return;
        box.style.display = "block";
        box.innerHTML = "⏳ جاري التحليل المنطقي والنحوي...";

        // A. المحرك المنطقي (Logic Engine)
        const logicRules = [
            { f: /\b(went|left|saw)\s+.*?tomorrow\b/gi, r: "will go tomorrow" },
            { f: /\b(will|shall)\s+.*?yesterday\b/gi, r: "did ... yesterday" }
        ];
        
        let logicFixed = input;
        let isLogicFixed = false;
        logicRules.forEach(rule => {
            if (rule.f.test(logicFixed)) {
                logicFixed = logicFixed.replace(rule.f, rule.r);
                isLogicFixed = true;
            }
        });

        // B. طلب الـ API للنحو
        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: logicFixed, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            
            let corrected = logicFixed;
            data.matches.sort((a,b) => b.offset - a.offset).forEach(m => {
                corrected = corrected.substring(0, m.offset) + m.replacements[0].value + corrected.substring(m.offset + m.length);
            });

            box.innerHTML = `
                <strong>الجملة الأصلية:</strong><br>${input} ${getAudioMarkup(input)}<br><br>
                ${isLogicFixed ? `<div style="color:#f59e0b">⚠️ تم تصحيح خطأ منطقي (تضارب أزمنة)</div>` : ""}
                <strong style="color:#22c55e">الجملة المصححة:</strong><br>${corrected} ${getAudioMarkup(corrected)}
            `;
        } catch(e) { box.innerHTML = "⚠️ خطأ في الاتصال."; }
    }

    // --- وظائف مساعدة ---
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tab === 'checker' ? 'btnChecker' : 'btnDict').classList.add('active');
        document.getElementById(tab + 'Section').classList.add('active');
    }

    function getAudioMarkup(text) {
        return `<button class="audio-btn" onclick="speak('${text.replace(/'/g, "\\'")}', 'en-US')">US</button>
                <button class="audio-btn" onclick="speak('${text.replace(/'/g, "\\'")}', 'en-GB')">UK</button>`;
    }

    function speak(text, locale) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = locale;
        window.speechSynthesis.speak(u);
    }

    async function searchWord(w = null) {
        const word = w || document.getElementById("wordInput").value.trim();
        if (!word) return;
        const box = document.getElementById("dictionaryResult");
        box.style.display = "block";
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            box.innerHTML = `<strong>${word}</strong> ${getAudioMarkup(word)}<br>Def: ${data[0].meanings[0].definitions[0].definition}`;
        } catch(e) { box.innerHTML = "⚠️ غير موجودة."; }
    }
</script>
</body>
</html>
