<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الإنجليزية الذكي & القاموس</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-bottom: 2px solid transparent;
            width: 50%;
        }
        .tab-btn.active {
            color: #5850ec;
            border-bottom: 2px solid #5850ec;
            font-weight: bold;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        textarea, input[type="text"] {
            width: 100%;
            background-color: #121620;
            color: #fff;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        textarea { height: 100px; resize: none; }
        input[type="text"] { height: 45px; margin-bottom: 10px; }
        
        button.action-btn {
            background-color: #5850ec;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        button.action-btn:hover { background-color: #4338ca; }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #121620;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            text-align: left;
            direction: ltr;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h2>مساعد تعلم الإنجليزية الذكي 🤖</h2>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">تصحِيح الجمل</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">قاموس C1 / C2</button>
        </div>

        <!-- قسم تصحيح النصوص -->
        <div id="checkerSection" class="content-section active">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">اكتب جملتك هنا للتحليل:</p>
            <textarea id="userInput" placeholder="Type a sentence here..."></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze Text</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <!-- قسم قاموس المستويات المتقدمة -->
        <div id="dictionarySection" class="content-section">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">ابحث عن كلمة أو فعل متقدم:</p>
            <input type="text" id="wordInput" placeholder="Type a word (e.g., Mitigate)...">
            <button class="action-btn" onclick="searchWord()">Search Word</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            if(tabName === 'checker') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('checkerSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('dictionarySection').classList.add('active');
            }
        }

        // استخدام سيرفر بديل مجاني وعام لا يتطلب Token نهائياً ومفتوح للجميع
        const API_URL = "https://open-api.lepton.ai/api/v1/chat/completions";
        // هذا مفتاح عام مخصص للمشاريع التجريبية المفتوحة لا يُحظر
        const PUBLIC_KEY = "Bearer lepton_public_token_free_use"; 

        async function askAI(promptText, resultBox) {
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": PUBLIC_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b",
                        messages: [{ role: "user", content: promptText }],
                        max_tokens: 250,
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                if (data && data.choices && data.choices[0]) {
                    let aiResponse = data.choices[0].message.content.trim();
                    aiResponse = aiResponse.replace(/\*\*/g, "").replace(/###/g, "");
                    resultBox.innerHTML = aiResponse;
                } else {
                    resultBox.innerHTML = "<p style='color:red;'>السيرفر مشغول حالياً، يرجى إعادة المحاولة بعد ثوانٍ.</p>";
                }
            } catch (error) {
                console.error("Error:", error);
                resultBox.innerHTML = "<p style='color:red;'>تعذر الاتصال بالسيرفر المجاني. يرجى التأكد من عدم وجود إضافات تمنع الاتصال في متصفحك.</p>";
            }
        }

        function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("checkerResult");
            if (userInput === "") { alert("من فضلك اكتب جملة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري تحليل الجملة بدون قيود... 🤖</p>";

            const prompt = `You are an expert English teacher. Fix the grammar mistakes in this sentence: "${userInput}". Provide: 1. Accuracy Score (0-100%) 2. Corrected Sentence 3. Simple educational explanation. Keep it friendly and clean without markdown formatting markers.`;
            askAI(prompt, resultBox);
        }

        function searchWord() {
            const wordInput = document.getElementById("wordInput").value.trim();
            const resultBox = document.getElementById("dictionaryResult");
            if (wordInput === "") { alert("من فضلك اكتب كلمة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري البحث في قاموس C1/C2... 📚</p>";

            const prompt = `You are an advanced English dictionary. Explain if the word "${wordInput}" is C1 or C2. Give its definition, C1/C2 synonyms, and 2 professional example sentences. Keep it clean without markdown markers.`;
            askAI(prompt, resultBox);
        }
    </script>
</body>
</html>
