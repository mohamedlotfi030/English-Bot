<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المساعد اللغوي المتكامل</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    textarea, input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #0f172a; border-right: 5px solid #5850ec; text-align: left; direction: ltr; }
    .label { color: #5850ec; font-weight: bold; display: block; margin-top: 10px; }
    .audio-group { margin-top: 10px; display: flex; gap: 5px; }
    .audio-btn { background: #334155; border: none; color: white; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
    .audio-btn:hover { background: #4338ca; }
  </style>
</head>
<body>

<div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('checker')">التصحيح</button>
      <button class="tab-btn" onclick="switchTab('dictionary')">القاموس</button>
    </div>

    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="اكتب الجملة هنا..."></textarea>
      <button class="action-btn" onclick="analyzeText()">تحليل وتصحيح</button>
      <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>

    <div id="dictionarySection" class="content-section">
      <input type="text" id="wordInput" placeholder="أدخل كلمة للبحث...">
      <button class="action-btn" onclick="searchWord()">بحث وتعلم</button>
      <div id="dictionaryResult" class="result-box" style="display:none;"></div>
    </div>
</div>

<script>
    // --- وظائف النطق المتقدمة ---
    function speak(text, locale) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = locale; // 'en-US' أو 'en-GB'
        window.speechSynthesis.speak(u);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(tab === 'checker' ? 'التصحيح' : 'القاموس')));
        document.querySelectorAll('.content-section').forEach(s => s.classList.toggle('active', s.id === tab + 'Section'));
    }

    // --- محرك التصحيح الهجين ---
    async function analyzeText() {
        const input = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        if (!input) return;
        
        box.style.display = "block";
        box.innerHTML = "⏳ تحليل...";

        let text = input;
        // قواعد يدوية (يمكنك إضافة المزيد هنا)
        const rules = [
            { f: /\bwe is\b/gi, r: "we are" },
            { f: /\bhe do\b/gi, r: "he does" },
            { f: /\ba apple\b/gi, r: "an apple" },
            { f: /\bwent tomorrow\b/gi, r: "will go tomorrow" }
        ];
        rules.forEach(rule => text = text.replace(rule.f, rule.r));

        // طلب API (للأخطاء العامة)
        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: text, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            if (data.matches && data.matches.length > 0) {
                text = text.substring(0, data.matches[0].offset) + data.matches[0].replacements[0].value + text.substring(data.matches[0].offset + data.matches[0].length);
            }
        } catch(e) {}

        box.innerHTML = `<strong>Correction:</strong><br>${text} 
            <div class="audio-group">
                <button class="audio-btn" onclick="speak('${text}', 'en-US')">🔊 US Accent</button>
                <button class="audio-btn" onclick="speak('${text}', 'en-GB')">🔊 UK Accent</button>
            </div>`;
    }

    // --- محرك القاموس التعليمي ---
    async function searchWord() {
        const word = document.getElementById("wordInput").value.trim();
        const box = document.getElementById("dictionaryResult");
        if (!word) return;

        box.style.display = "block";
        box.innerHTML = "⏳ جاري البحث...";

        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
            ]);

            const definition = en ? en[0].meanings[0].definitions[0].definition : "No definition found.";
            const example = en && en[0].meanings[0].definitions[0].example ? en[0].meanings[0].definitions[0].example : "No example available.";

            box.innerHTML = `<strong>${word}</strong>
                <span class="label">Arabic:</span> ${ar.responseData.translatedText}
                <span class="label">English Definition:</span> ${definition}
                <span class="label">Example:</span> "${example}"
                <div class="audio-group">
                    <button class="audio-btn" onclick="speak('${word}', 'en-US')">🔊 US Accent</button>
                    <button class="audio-btn" onclick="speak('${word}', 'en-GB')">🔊 UK Accent</button>
                </div>`;
        } catch(e) { box.innerHTML = "⚠️ تعذر العثور على الكلمة."; }
    }
</script>
</body>
</html>
