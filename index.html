<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المساعد اللغوي - نظام محترف</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 650px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    
    textarea, input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #0f172a; border-right: 5px solid #5850ec; text-align: left; direction: ltr; min-height: 80px; }
    .audio-group { margin-top: 10px; display: flex; gap: 5px; }
    .audio-btn { background: #334155; border: none; color: white; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
    
    .level-nav { display: flex; gap: 5px; margin-bottom: 10px; }
    .level-btn { background: #1e293b; color: #cbd5e1; border: 1px solid #5850ec; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .level-btn.active { background: #5850ec; color: white; }
    .word-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 8px; }
    .word-chip { background: #334155; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; text-align: center; border: 1px solid #475569; }
  </style>
</head>
<body>

<div class="container">
    <div class="tabs">
      <button class="tab-btn active" id="btnChecker" onclick="switchTab('checker')">التصحيح</button>
      <button class="tab-btn" id="btnDict" onclick="switchTab('dictionary')">القاموس</button>
    </div>

    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="اكتب الجملة هنا (مثال: I left tomorrow)"></textarea>
      <button class="action-btn" onclick="processText()">تحليل وتصحيح</button>
      <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>

    <div id="dictionarySection" class="content-section">
      <div class="level-nav">
          <button class="level-btn active" onclick="loadWords('B2')">B2</button>
          <button class="level-btn" onclick="loadWords('C1')">C1</button>
          <button class="level-btn" onclick="loadWords('C2')">C2</button>
      </div>
      <input type="text" id="wordInput" placeholder="بحث...">
      <button class="action-btn" onclick="searchWord()">بحث وتعلم</button>
      <div id="dictionaryResult" class="result-box" style="display:none;"></div>
      <div id="wordList" class="word-list"></div>
    </div>
</div>

<script>
    // --- قواعد التصحيح الموسعة ---
    const grammarRules = [
        { f: /\b(we|they)\s+is\b/gi, r: "$1 are" },
        // تغطية أفعال الماضي مع زمن المستقبل
        { f: /\bleft\s+.*?tomorrow\b/gi, r: "will leave tomorrow" },
        { f: /\bwent\s+.*?tomorrow\b/gi, r: "will go tomorrow" },
        { f: /\b(saw|seen)\s+.*?tomorrow\b/gi, r: "will see tomorrow" },
        // عكس القواعد
        { f: /\bwill\s+.*?yesterday\b/gi, r: "did ... yesterday" }
    ];

    const vocabData = {
        B2: ["Ambiguous", "Beneficial", "Consistent", "Establish", "Evaluate", "Fundamental", "Generate", "Hypothesis", "Implement", "Objective", "Promote", "Significant", "Sustain", "Theoretical", "Underestimate"],
        C1: ["Advocate", "Coherent", "Compromise", "Constitute", "Discrepancy", "Indispensable", "Meticulous", "Pragmatic", "Redundant", "Scrutinize", "Subsequent", "Trivial", "Vulnerable", "Zealous"],
        C2: ["Ephemeral", "Exacerbate", "Immutable", "Inherent", "Juxtapose", "Paradigm", "Quintessential", "Repercussion", "Superfluous", "Ubiquitous", "Unprecedented", "Vicarious", "Widespread", "Yield", "Zenith"]
    };

    // --- الوظائف ---
    function speak(text, lang) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        window.speechSynthesis.speak(u);
    }

    function getAudioMarkup(text) {
        return `<div class="audio-group">
                    <button class="audio-btn" onclick="speak('${text.replace(/'/g, "\\'")}', 'en-US')">🔊 US</button>
                    <button class="audio-btn" onclick="speak('${text.replace(/'/g, "\\'")}', 'en-GB')">🔊 UK</button>
                </div>`;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tab === 'checker' ? 'btnChecker' : 'btnDict').classList.add('active');
        document.getElementById(tab + 'Section').classList.add('active');
    }

    async function processText() {
        let text = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        if (!text) return;
        box.style.display = "block";
        box.innerHTML = "⏳ تحليل...";
        
        // تطبيق القواعد المحدثة
        grammarRules.forEach(rule => text = text.replace(rule.f, rule.r));

        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: text, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            if (data.matches && data.matches.length > 0) {
                data.matches.sort((a,b) => b.offset - a.offset).forEach(m => {
                    text = text.substring(0, m.offset) + m.replacements[0].value + text.substring(m.offset + m.length);
                });
            }
            box.innerHTML = `<strong>Correction:</strong><br>${text} ${getAudioMarkup(text)}`;
        } catch(e) { box.innerHTML = `<strong>Result:</strong><br>${text} ${getAudioMarkup(text)}`; }
    }

    function loadWords(level) {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const listDiv = document.getElementById('wordList');
        listDiv.innerHTML = '';
        vocabData[level].forEach(w => {
            const span = document.createElement('span');
            span.className = 'word-chip';
            span.innerText = w;
            span.onclick = () => searchWord(w);
            listDiv.appendChild(span);
        });
    }

    async function searchWord(w = null) {
        const word = w || document.getElementById("wordInput").value.trim();
        if (!word) return;
        const box = document.getElementById("dictionaryResult");
        box.style.display = "block";
        box.innerHTML = "⏳ جاري البحث...";
        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
            ]);
            const def = en ? en[0].meanings[0].definitions[0].definition : "No definition.";
            const ex = en && en[0].meanings[0].definitions[0].example ? en[0].meanings[0].definitions[0].example : "No example.";
            box.innerHTML = `<strong>${word}</strong><br>AR: ${ar.responseData.translatedText}<br>Def: ${def}<br>Ex: "${ex}" ${getAudioMarkup(word)}`;
        } catch(e) { box.innerHTML = "⚠️ تعذر العثور على الكلمة."; }
    }

    loadWords('B2');
</script>
</body>
</html>
