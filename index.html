<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح اللغة الإنجليزية الذكي</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #121620;
            color: #fff;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        button {
            background-color: #5850ec;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        button:hover {
            background-color: #4338ca;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #121620;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            text-align: left;
            direction: ltr;
            display: none;
            white-space: pre-line;
        }
        .score {
            font-size: 24px;
            color: #f43f5e;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h2>مساعد تعلم الإنجليزية الذكي 🤖</h2>
    <p>اكتب جملة بالإنجليزية ليتفحصها الذكاء الاصطناعي</p>

    <div class="container">
        <textarea id="userInput" placeholder="Type a sentence here and I'll check it for mistakes..."></textarea>
        <button onclick="analyzeText()">Analyze Text</button>
        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        // الـ Token الخاص بك جاهز ومفعل هنا
        const HF_API_KEY = "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"; 
        const API_URL = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct";

        async function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("resultBox");
            
            if (userInput === "") {
                alert("من فضلك اكتب جملة أولاً!");
                return;
            }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري تحليل الجملة بواسطة Llama 3... 🤖</p>";

            const prompt = `<|begin_of_text|><|start_header_id|>system<|end_header_id|>
            You are an expert English language teacher bot. Analyze the user's English sentence for grammar and vocabulary mistakes.
            Provide a clear report containing:
            1. Accuracy Score (0% to 100%)
            2. The Corrected Sentence
            3. A brief educational Breakdown explaining the correction in easy English.
            Keep the output friendly, clear, and direct. Do not use complex markdown.<|eot_id|><|start_header_id|>user<|end_header_id|>
            Analyze this sentence: "${userInput}"<|eot_id|><|start_header_id|>assistant<|end_header_id|>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: prompt,
                        parameters: {
                            max_new_tokens: 250,
                            temperature: 0.7
                        }
                    })
                });

                const data = await response.json();
                
                if (data && data[0] && data[0].generated_text) {
                    const fullText = data[0].generated_text;
                    const aiResponse = fullText.split("<|start_header_id|>assistant<|end_header_id|>")[1] || fullText;
                    
                    resultBox.innerHTML = aiResponse.trim();
                } else if (data.error && data.error.includes("loading")) {
                    // السيرفر يقوم بتحميل النموذج لأول مرة، ننتظر ثوانٍ ونعيد المحاولة تلقائياً
                    resultBox.innerHTML = "<p style='text-align:center; color:#eab308;'>النموذج يستيقظ الآن.. جاري التحميل، انتظر ثوانٍ وتلقائياً سيعمل... ⏳</p>";
                    setTimeout(analyzeText, 5000);
                } else {
                    resultBox.innerHTML = "<p style='color:red;'>حدثت مشكلة في قراءة البيانات. تأكد من صحة الـ Token وحاول مجدداً.</p>";
                }

            } catch (error) {
                console.error("Error:", error);
                resultBox.innerHTML = "<p style='color:red;'>فشل الاتصال بالخادم. تأكد من الإنترنت.</p>";
            }
        }
    </script>

</body>
</html>
