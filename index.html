<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المساعد اللغوي المتكامل (النسخة الاحترافية)</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .main-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
    .panel { background-color: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    h2 { color: #5850ec; margin-top: 0; }
    textarea, input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    .result-box { margin-top: 15px; padding: 15px; background: #0f172a; border-left: 5px solid #5850ec; direction: ltr; text-align: left; }
    .word-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; height: 300px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 8px; margin-top: 10px; }
    .word-chip { background: #334155; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center; }
    .word-chip:hover { background: #5850ec; }
    .audio-btn { background: #334155; border: none; color: white; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; margin-top: 5px; }
  </style>
</head>
<body>

<div class="main-dashboard">
    <div class="panel">
        <h2>🛠 التصحيح الذكي</h2>
        <textarea id="userInput" rows="6" placeholder="اكتب جملتك هنا... (مثال: He went to school tomorrow)"></textarea>
        <button class="action-btn" onclick="processText()">تحليل وتصحيح</button>
        <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>

    <div class="panel">
        <h2>📖 القاموس المتقدم (B2/C1/C2)</h2>
        <input type="text" id="wordInput" placeholder="ابحث عن كلمة...">
        <button class="action-btn" onclick="searchWord()">بحث وتعلم</button>
        <div id="dictionaryResult" class="result-box" style="display:none;"></div>
        <div class="word-list" id="wordList"></div>
    </div>
</div>

<script>
    // --- قائمة كلمات موسعة (يمكنك زيادتها بسهولة) ---
    const vocabData = [
        "Ambiguous", "Beneficial", "Consistent", "Establish", "Evaluate", "Fundamental", "Generate", "Hypothesis", "Implement", "Objective", "Promote", "Significant", "Sustain", "Theoretical", "Underestimate",
        "Advocate", "Coherent", "Compromise", "Constitute", "Discrepancy", "Eloquent", "Indispensable", "Meticulous", "Pragmatic", "Redundant", "Scrutinize", "Subsequent", "Trivial", "Vulnerable", "Zealous",
        "Ephemeral", "Exacerbate", "Immutable", "Inherent", "Juxtapose", "Paradigm", "Quintessential", "Repercussion", "Superfluous", "Ubiquitous", "Unprecedented", "Vicarious", "Widespread", "Yield", "Zenith"
    ];

    // ملء قائمة الكلمات تلقائياً
    const listDiv = document.getElementById('wordList');
    vocabData.forEach(w => {
        const div = document.createElement('div');
        div.className = 'word-chip';
        div.innerText = w;
        div.onclick = () => searchWord(w);
        listDiv.appendChild(div);
    });

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    // --- منطق التصحيح المطور ---
    async function processText() {
        let text = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        if (!text) return;
        box.style.display = "block";
        box.innerHTML = "⏳ جاري التحليل...";

        // قواعد يدوية ذكية باستخدام Wildcards للتعامل مع "He went to ... tomorrow"
        const rules = [
            { regex: /\bwent\s+.*?tomorrow\b/gi, replacement: "will go tomorrow" },
            { regex: /\bwill go\s+.*?yesterday\b/gi, replacement: "went yesterday" },
            { regex: /\b(we|they)\s+is\b/gi, replacement: "$1 are" },
            { regex: /\b(he|she|it)\s+are\b/gi, replacement: "$1 is" }
        ];
        
        rules.forEach(rule => text = text.replace(rule.regex, rule.replacement));

        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: text, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            if (data.matches && data.matches.length > 0) {
                data.matches.sort((a, b) => b.offset - a.offset).forEach(m => {
                    text = text.substring(0, m.offset) + m.replacements[0].value + text.substring(m.offset + m.length);
                });
            }
            box.innerHTML = `<strong>Correction:</strong><br>${text}<br><button class="audio-btn" onclick="speak('${text.replace(/'/g, "")}')">🔊 نطق</button>`;
        } catch(e) { box.innerHTML = `<strong>Result:</strong><br>${text}`; }
    }

    // --- منطق القاموس ---
    async function searchWord(w = null) {
        const word = w || document.getElementById("wordInput").value.trim();
        if (!word) return;
        const box = document.getElementById("dictionaryResult");
        box.style.display = "block";
        box.innerHTML = "⏳ جاري البحث...";
        
        try {
            const [ar, en] = await Promise.all([
                fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
            ]);
            const def = en ? en[0].meanings[0].definitions[0].definition : "No definition.";
            const ex = en && en[0].meanings[0].definitions[0].example ? en[0].meanings[0].definitions[0].example : "No example.";
            box.innerHTML = `<strong>${word}</strong><br>Arabic: ${ar.responseData.translatedText}<br>Def: ${def}<br>Ex: "${ex}"<br><button class="audio-btn" onclick="speak('${word}')">🔊 نطق</button>`;
        } catch(e) { box.innerHTML = "⚠️ تعذر العثور على الكلمة."; }
    }
</script>
</body>
</html>
