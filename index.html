<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="English-Bot is an AI-powered English learning assistant featuring grammar checking, dictionary, pronunciation, translation and vocabulary learning.">
    <meta name="keywords" content="English, Grammar, Dictionary, AI, Vocabulary, Translation">
    <meta name="author" content="A.S.I">
    <meta name="theme-color" content="#16a34a">

    <title>English-Bot | AI English Learning Assistant</title>

    <link rel="icon" href="./assets/ASI-logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/themes.css">
</head>

<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">
            <img src="./assets/ASI-logo.png" alt="English-Bot Logo">
            <div>
                <h2>English-Bot</h2>
                <small>Powered by A.S.I</small>
            </div>
        </div>

        <nav class="menu">
            <button class="nav-item active" data-page="home">🏠 Home</button>
            <button class="nav-item" data-page="checker">📝 Grammar Checker</button>
            <button class="nav-item" data-page="dictionary">📖 Dictionary</button>
            <button class="nav-item" data-page="vocabulary">🎓 Vocabulary</button>
            <button class="nav-item" data-page="favorites">❤️ Favorites</button>
            <button class="nav-item" data-page="history">🕓 History</button>
            <button class="nav-item" data-page="settings">⚙ Settings</button>
        </nav>

        <div class="sidebar-footer">
            <small>Version 7.0</small>
        </div>
    </aside>

    <div class="main">
        <header class="header">
            <div class="header-left">
                <h1 id="pageTitle">Home</h1>
                <p>Improve your English every day.</p>
            </div>

            <div class="header-right">
                <button id="menuBtn"><i class="fa fa-bars"></i></button>
                <button id="searchBtn"><i class="fa fa-search"></i></button>
                <button id="themeBtn"><i class="fa fa-moon"></i></button>
            </div>
        </header>

        <main id="content">

            <section class="card hero">
                <h2>Welcome to English-Bot 👋</h2>
                <p>Your complete AI English learning assistant.</p>
            </section>

            <section class="dashboard">
                <div class="card">Grammar Checker</div>
                <div class="card">Dictionary</div>
                <div class="card">Vocabulary</div>
                <div class="card">Progress</div>
            </section>

            <!-- Grammar Checker UI -->
            <section id="checkerSection" class="card">
                <textarea id="userInput" placeholder="Enter your sentence..."></textarea>
                <button onclick="processText()">Check</button>
                <div id="checkerResult"></div>
            </section>

        </main>

        <footer class="footer">
            <p>© 2026 English-Bot</p>
            <p>Powered by A.S.I</p>
        </footer>
    </div>
</div>

<!-- UI SYSTEM -->
<div id="toast"></div>
<div id="loader" class="hidden"></div>

<!-- =========================
     ENGINE CORE (v7 ORDER FIXED)
========================= -->

<!-- 1. FRAMEWORK -->
<script src="./js/engine/grammar-framework.js"></script>
<script src="./js/engine/engine.js"></script>
<script src="./js/engine/ruleManager.js"></script>

<!-- 2. NLP CORE -->
<script src="./js/engine/tokenizer.js"></script>
<script src="./js/engine/analyzer.js"></script>
<script src="./js/engine/corrector.js"></script>

<!-- 3. DICTIONARIES -->
<script src="./js/engine/dictionaries/verbs.js"></script>
<script src="./js/engine/dictionaries/nouns.js"></script>
<script src="./js/engine/dictionaries/adjectives.js"></script>
<script src="./js/engine/dictionaries/adverbs.js"></script>
<script src="./js/engine/dictionaries/prepositions.js"></script>
<script src="./js/engine/dictionaries/pronouns.js"></script>
<script src="./js/engine/dictionaries/articles.js"></script>

<!-- 4. RULES -->
<script src="./js/engine/rules/questionRules.js"></script>
<script src="./js/engine/rules/tenseRules.js"></script>
<script src="./js/engine/rules/spellingRules.js"></script>
<script src="./js/engine/rules/wordOrderRules.js"></script>
<script src="./js/engine/rules/vocabularyRules.js"></script>
<script src="./js/engine/rules/reportedSpeechRules.js"></script>

<!-- 5. APP -->
<script src="./js/utils.js"></script>
<script src="./js/speech.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/checker.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    try {
        GrammarEngine.initialize();
        console.log("English-Bot v7 Ready");
    } catch (e) {
        console.error("Init error:", e);
    }
});
</script>

</body>
</html>
