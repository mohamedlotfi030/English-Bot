<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد والقاموس الشامل</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-bottom: 2px solid transparent;
            width: 50%;
        }
        .tab-btn.active {
            color: #5850ec;
            border-bottom: 2px solid #5850ec;
            font-weight: bold;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        textarea, input[type="text"] {
            width: 100%;
            background-color: #121620;
            color: #fff;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        textarea { height: 100px; resize: none; }
        input[type="text"] { height: 45px; margin-bottom: 10px; }
        
        button.action-btn {
            background-color: #5850ec;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }
        button.action-btn:hover { background-color: #4338ca; }

        .audio-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 5px 15px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
        }
        .audio-btn:hover { background-color: #059669; }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #121620;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            text-align: left;
            direction: ltr;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }

        /* تنسيقات الفهرس الشامل */
        .book-container {
            background-color: #0f172a;
            border: 1px solid #3f4451;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            direction: ltr;
        }
        .book-title {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid #3f4451;
            padding-bottom: 5px;
        }
        .word-chip {
            display: inline-block;
            background-color: #1e293b;
            color: #cbd5e1;
            padding: 6px 12px;
            margin: 4px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .word-chip:hover {
            background-color: #334155;
            border-color: #5850ec;
            color: white;
        }
    </style>
</head>
<body>

    <h2>المساعد والقاموس الشامل 📖🗣️</h2>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">تصحِيح الجمل</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">القاموس الشامل</button>
        </div>

        <div id="checkerSection" class="content-section active">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">اكتب جملتك هنا للتحليل والنطق:</p>
            <textarea id="userInput" placeholder="Type here, e.g., I am bad on English..."></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze & Correct Text</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <div id="dictionarySection" class="content-section">
            <p style="text-align:right; font-size:14px; color:#a0aec0;">ابحث عن أي كلمة، أو اختر من الفهرس:</p>
            
            <div class="book-container">
                <div class="book-title">📚 Comprehensive Index (B1 to C2) - Click any word</div>
                <div id="bookWords">
                    </div>
            </div>

            <input type="text" id="wordInput" placeholder="Type ANY word to translate & define...">
            <button class="action-btn" onclick="searchWord()">Search & Translate</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>
    </div>

    <script>
        // 1. نظام التبديل بين التبويبات
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            if(tabName === 'checker') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('checkerSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('dictionarySection').classList.add('active');
            }
        }

        // 2. نظام النطق الصوتي
        function playAudio(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("متصفحك لا يدعم النطق الصوتي.");
            }
        }

        // 3. محرك تصحيح القواعد (النسخة المجانية المفتوحة)
        async function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("checkerResult");
            if (userInput === "") { alert("من فضلك اكتب جملة أولاً!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري التحليل... 🧠</p>";

            try {
                const response = await fetch("https://api.languagetool.org/v2/check", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Accept": "application/json"
                    },
                    body: new URLSearchParams({ text: userInput, language: "en-US", level: "picky" })
                });

                const data = await response.json();
                let correctedText = userInput;
                let explanations = [];
                
                if (data.matches && data.matches.length > 0) {
                    const matches = data.matches.sort((a, b) => b.offset - a.offset);
                    matches.forEach(match => {
                        if (match.replacements && match.replacements.length > 0) {
                            const replacement = match.replacements[0].value;
                            correctedText = correctedText.substring(0, match.offset) + replacement + correctedText.substring(match.offset + match.length);
                            explanations.push(`- Fixed: "${userInput.substring(match.offset, match.offset + match.length)}" ➔ "${replacement}"`);
                        }
                    });

                    resultBox.innerHTML = `<strong>Corrected Sentence:</strong> <button class="audio-btn" onclick="playAudio('${correctedText.replace(/'/g, "\\'")}')">🔊 اسمع</button>\n<span style="color:#10b981; font-weight:bold; font-size:18px;">${correctedText}</span>\n\n<strong>Explanation:</strong>\n${explanations.join('\n')}`;
                } else {
                    resultBox.innerHTML = `<strong>Corrected Sentence:</strong> <button class="audio-btn" onclick="playAudio('${userInput.replace(/'/g, "\\'")}')">🔊 اسمع</button>\n<span style="color:#10b981; font-weight:bold; font-size:18px;">${userInput}</span>\n\n✨ Perfect! No grammar mistakes.`;
                }
            } catch (error) {
                resultBox.innerHTML = "<p style='color:red;'>عذراً، فشل الاتصال. تأكد من الإنترنت.</p>";
            }
        }
        // إضافة محقق أزمنة ذكي جداً
                const lowerInput = userInput.toLowerCase();
                if ((lowerInput.includes("went") || lowerInput.includes("did")) && lowerInput.includes("tomorrow")) {
                    explanations.push("- Note: You used a past tense verb with 'tomorrow'. Use future tense instead (e.g., 'I will go').");
                    resultBox.innerHTML = `<strong>Grammar/Logic Note:</strong>\n${explanations.join('\n')}`;
                    return; // إيقاف العرض العادي وإظهار التنبيه
                }

        // 4. محرك القاموس والترجمة وتحديد المستوى (B1 إلى C2)
        async function searchWord(wordFromBook = null) {
            const wordInput = wordFromBook || document.getElementById("wordInput").value.trim();
            if (wordFromBook) document.getElementById("wordInput").value = wordFromBook;
            
            const resultBox = document.getElementById("dictionaryResult");
            if (wordInput === "") { alert("من فضلك اكتب كلمة أو اختر من الفهرس!"); return; }

            resultBox.style.display = "block";
            resultBox.innerHTML = "<p style='text-align:center; color:#5850ec;'>جاري الترجمة والشرح... 📚</p>";

            // تحديد مستوى الكلمة تقريبياً
            let estimatedLevel = "B1 / B2 (Intermediate)";
            if (wordInput.length > 8) {
                estimatedLevel = "C1 / C2 (Advanced)";
            } else if (wordInput.length < 5) {
                estimatedLevel = "A1 / A2 (Beginner)";
            }

            try {
                // جلب الترجمة العربية
                const arResponse = await fetch(`https://api.mymemory.translated.net/get?q=${wordInput}&langpair=en|ar`);
                const arData = await arResponse.json();
                const arabicMeaning = arData.responseData.translatedText;

                // جلب الشرح الإنجليزي
                const enResponse = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${wordInput}`);
                if (!enResponse.ok) throw new Error("Word definition not found");
                
                const enData = await enResponse.json();
                const wordData = enData[0];
                const definition = wordData.meanings[0].definitions[0].definition;
                const example = wordData.meanings[0].definitions[0].example || "No example available.";
                const partOfSpeech = wordData.meanings[0].partOfSpeech;

                resultBox.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0; color:#fff;">${wordData.word} <span style="font-size:14px; color:#a0aec0;">(${partOfSpeech})</span></h3>
                        <button class="audio-btn" onclick="playAudio('${wordData.word}')">🔊 انطق</button>
                    </div>
                    <p style="margin: 5px 0 10px 0; font-size: 14px; color: #10b981;">Level: ${estimatedLevel}</p>
                    <hr style="border-color:#3f4451; margin:10px 0;">
                    <strong>Arabic Meaning:</strong> <span style="color:#fbbf24; font-size:18px;">${arabicMeaning}</span>\n
                    <strong>English Definition:</strong>\n${definition}\n
                    <strong>Example:</strong>\n<span style="color:#a0aec0; font-style: italic;">"${example}"</span>
                `;
            } catch (error) {
                resultBox.innerHTML = `<p style='color:#eab308;'>لا يوجد شرح إنجليزي أكاديمي لهذه الكلمة، ولكن تمت ترجمتها:</p>
                <button class="audio-btn" onclick="playAudio('${wordInput}')">🔊 انطق</button>
                <hr style="border-color:#3f4451;">
                <strong>الكلمة:</strong> ${wordInput}<br>
                <strong>الترجمة:</strong> جاري البحث...`;
                
                fetch(`https://api.mymemory.translated.net/get?q=${wordInput}&langpair=en|ar`)
                .then(res => res.json())
                .then(data => {
                    resultBox.innerHTML += `<br><span style="color:#fbbf24; font-size:18px;">${data.responseData.translatedText}</span>`;
                });
            }
        }

        // 5. تغذية "الفهرس الشامل" بكمية ضخمة من الكلمات (B1 - C2) وترتيبها أبجدياً
        const comprehensiveWords = [
            // B1 & B2 Words
            "Achieve", "Advice", "Analyze", "Approach", "Benefit", "Challenge", "Concept",
            "Context", "Describe", "Encourage", "Environment", "Factor", "Frequent", 
            "Identify", "Improve", "Method", "Motivate", "Opportunity", "Predict", 
            "Process", "Recognize", "Significant", "Structure", "Tradition", "Unique", 
            "Valuable", "Variable", "Wonder",
            // C1 & C2 Words
            "Accomplish", "Ambiguous", "Benevolent", "Breathtaking", "Candid", "Crucial", 
            "Devastating", "Diligent", "Eccentric", "Eloquent", "Fascinating", "Flawless", 
            "Genuine", "Gullible", "Hilarious", "Hypocritical", "Impeccable", "Inevitable", 
            "Jeopardize", "Jubilant", "Knowledgeable", "Lucrative", "Mitigate", "Notorious", 
            "Obsolete", "Pragmatic", "Quarantine", "Resilient", "Scrutinize", "Tremendous", 
            "Ubiquitous", "Vulnerable", "Widespread", "Xenophobia", "Yield", "Zealous"
        ];

        // ترتيب الكلمات أبجدياً A-Z لتبدو كفهرس حقيقي
        comprehensiveWords.sort();

        const bookContainer = document.getElementById("bookWords");
        comprehensiveWords.forEach(word => {
            const chip = document.createElement("span");
            chip.className = "word-chip";
            chip.innerText = word;
            chip.onclick = () => searchWord(word); 
            bookContainer.appendChild(chip);
        });
    </script>
</body>
</html>
