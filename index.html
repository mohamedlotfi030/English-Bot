<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المساعد اللغوي - نظام التحليل الذكي</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    
    textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    
    .result-box { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; }
    .error { color: #ef4444; background: rgba(239, 68, 68, 0.2); text-decoration: underline; font-weight: bold; }
    .score-bar { height: 8px; background: #334155; border-radius: 4px; margin: 10px 0; overflow: hidden; }
    .score-fill { height: 100%; background: #22c55e; transition: width 0.5s; }
    .suggestion { color: #38bdf8; font-size: 0.9em; margin-top: 5px; }
    .audio-btn { background: #334155; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; margin-left: 5px; }
  </style>
</head>
<body>

<div class="container">
    <div class="tabs">
      <button class="tab-btn active" id="btnChecker" onclick="switchTab('checker')">التحليل والتصحيح</button>
      <button class="tab-btn" id="btnDict" onclick="switchTab('dictionary')">القاموس</button>
    </div>

    <!-- قسم التصحيح -->
    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="اكتب الجملة هنا..."></textarea>
      <button class="action-btn" onclick="processText()">تحليل الجملة</button>
      <div id="checkerResult" class="result-box" style="display:none;"></div>
    </div>

    <!-- قسم القاموس -->
    <div id="dictionarySection" class="content-section">
      <input type="text" id="wordInput" placeholder="بحث...">
      <button class="action-btn" onclick="searchWord()">بحث وتعلم</button>
      <div id="dictionaryResult" class="result-box" style="display:none;"></div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tab === 'checker' ? 'btnChecker' : 'btnDict').classList.add('active');
        document.getElementById(tab + 'Section').classList.add('active');
    }

    async function processText() {
        const input = document.getElementById("userInput").value.trim();
        const box = document.getElementById("checkerResult");
        if (!input) return;
        
        box.style.display = "block";
        box.innerHTML = "⏳ جاري التحليل...";

        try {
            const res = await fetch("https://api.languagetool.org/v2/check", {
                method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ text: input, language: "en-US", level: "picky" })
            });
            const data = await res.json();
            
            // حساب النتيجة (Confidence Score)
            const score = Math.max(0, 100 - (data.matches.length * 15));
            
            // تلوين الأخطاء
            let highlighted = input;
            let corrected = input;
            
            // التعديل من النهاية للبداية للحفاظ على الـ Indices
            data.matches.sort((a,b) => b.offset - a.offset).forEach(m => {
                const errorText = input.substring(m.offset, m.offset + m.length);
                const replacement = m.replacements.length > 0 ? m.replacements[0].value : "";
                
                // إضافة وسم التظليل الأحمر
                highlighted = highlighted.substring(0, m.offset) + `<span class="error">${errorText}</span>` + highlighted.substring(m.offset + m.length);
                // التصحيح
                corrected = corrected.substring(0, m.offset) + replacement + corrected.substring(m.offset + m.length);
            });

            // بناء النتائج
            let output = `<strong>مؤشر الدقة: ${score}%</strong><div class="score-bar"><div class="score-fill" style="width:${score}%"></div></div>`;
            output += `<strong>الجملة الأصلية:</strong><br><div style="direction:ltr">${highlighted}</div><br>`;
            output += `<strong>الجملة المصححة:</strong><br><div style="direction:ltr; color:#22c55e;">${corrected}</div>`;
            
            if (data.matches.length > 0) {
                output += `<br><strong>بدائل مقترحة:</strong>`;
                data.matches.slice(0,3).forEach(m => {
                    output += `<div class="suggestion">• ${m.message}: ${m.replacements.map(r => r.value).slice(0,3).join(", ")}</div>`;
                });
            }
            
            box.innerHTML = output;
        } catch(e) { box.innerHTML = "⚠️ حدث خطأ في الاتصال بالخادم."; }
    }

    async function searchWord() {
        const word = document.getElementById("wordInput").value.trim();
        if (!word) return;
        const box = document.getElementById("dictionaryResult");
        box.style.display = "block";
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            const def = data[0].meanings[0].definitions[0].definition;
            box.innerHTML = `<strong>${word}</strong><br>Def: ${def}<br><button class="audio-btn" onclick="speechSynthesis.speak(new SpeechSynthesisUtterance('${word}'))">🔊 نطق</button>`;
        } catch(e) { box.innerHTML = "⚠️ كلمة غير موجودة."; }
    }
</script>
</body>
</html>
