<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد والقاموس الشامل</title>
    <style>
        body { background-color: #121620; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #1a202c; padding: 20px; border-radius: 12px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #2d3748; border: none; color: white; padding: 10px; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: #5850ec; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        textarea, input { width: 100%; background: #121620; color: white; border: 1px solid #3f4451; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button.action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #0f172a; display: none; }
        .word-chip { display: inline-block; background: #334155; padding: 5px 10px; margin: 3px; border-radius: 15px; cursor: pointer; font-size: 14px; }
        .word-chip:hover { background: #5850ec; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">التصحيح</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">القاموس</button>
        </div>

        <div id="checkerSection" class="content-section active">
            <textarea id="userInput" rows="4" placeholder="اكتب جملة بالإنجليزية هنا..."></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze & Correct</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <div id="dictionarySection" class="content-section">
            <div id="bookWords" style="max-height: 250px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #3f4451; padding: 10px;"></div>
            <input type="text" id="wordInput" placeholder="ابحث عن كلمة...">
            <button class="action-btn" onclick="searchWord()">Search</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>
    </div>

    <script>
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t === 'checker' ? 'التصحيح' : 'القاموس')));
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(t + 'Section').style.display = 'block';
        }

        function playAudio(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        async function analyzeText() {
            const input = document.getElementById("userInput").value.trim();
            const box = document.getElementById("checkerResult");
            if (!input) return;
            box.style.display = "block";
            box.innerHTML = "جاري التحليل...";

            // منطق "محقق الأزمنة" الخاص بنا
            const lower = input.toLowerCase();
            if ((lower.includes("went") || lower.includes("did")) && lower.includes("tomorrow")) {
                const corr = input.replace(/went/gi, "will go").replace(/did/gi, "will");
                box.innerHTML = `<strong>Correction:</strong> ${corr} <button onclick="playAudio('${corr}')">🔊</button>`;
                return;
            }

            // فحص السيرفر
            try {
                const res = await fetch("https://api.languagetool.org/v2/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ text: input, language: "en-US", level: "picky" })
                });
                const data = await res.json();
                
                if (data.matches && data.matches.length > 0) {
                    const corr = data.matches[0].replacements[0]?.value || "Grammar issue found";
                    box.innerHTML = `<strong>Correction:</strong> ${corr} <button onclick="playAudio('${corr}')">🔊</button>`;
                } else {
                    box.innerHTML = "✨ Perfect! No grammar mistakes found.";
                }
            } catch(e) { box.innerHTML = "Connection Error!"; }
        }

        async function searchWord(w = null) {
            const word = w || document.getElementById("wordInput").value.trim();
            const box = document.getElementById("dictionaryResult");
            if (!word) return;
            box.style.display = "block";
            box.innerHTML = "Searching...";
            try {
                const [ar, en] = await Promise.all([
                    fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
                ]);
                box.innerHTML = `<strong>${word}</strong> <button onclick="playAudio('${word}')">🔊</button><br>
                                 <strong>AR:</strong> ${ar.responseData.translatedText}<br>
                                 <strong>EN:</strong> ${en ? en[0].meanings[0].definitions[0].definition : "No definition."}`;
            } catch(e) { box.innerHTML = "Word not found."; }
        }

        // قاموس موسع
        const words = ["Achieve", "Ambiguous", "Benevolent", "Breathtaking", "Candid", "Crucial", "Diligent", "Eccentric", "Eloquent", "Fascinating", "Flawless", "Genuine", "Gullible", "Hypocritical", "Impeccable", "Inevitable", "Jubilant", "Knowledgeable", "Lucrative", "Mitigate", "Notorious", "Obsolete", "Pragmatic", "Quarantine", "Resilient", "Scrutinize", "Tremendous", "Ubiquitous", "Vulnerable", "Widespread", "Zealous", "Abandon", "Capacity", "Dilemma", "Emerge", "Framework", "Generate", "Hypothesis", "Initiative", "Justify", "Modify", "Navigate", "Objective", "Perceive", "Qualitative", "Rational", "Subsequent", "Threshold", "Ultimate", "Validate"];
        words.sort().forEach(w => {
            const s = document.createElement("span"); s.className = "word-chip"; s.innerText = w;
            s.onclick = () => searchWord(w);
            document.getElementById("bookWords").appendChild(s);
        });
    </script>
</body>
</html>
