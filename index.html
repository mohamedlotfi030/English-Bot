<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد والقاموس الشامل</title>
    <style>
        body { background-color: #121620; color: #ffffff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #1a202c; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; color: #a0aec0; font-size: 18px; cursor: pointer; padding: 10px; border-bottom: 2px solid transparent; width: 50%; }
        .tab-btn.active { color: #5850ec; border-bottom: 2px solid #5850ec; font-weight: bold; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        textarea, input[type="text"] { width: 100%; background-color: #121620; color: #fff; border: 1px solid #3f4451; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 16px; text-align: left; direction: ltr; }
        textarea { height: 100px; resize: none; }
        input[type="text"] { height: 45px; margin-bottom: 10px; }
        button.action-btn { background-color: #5850ec; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; transition: 0.3s; }
        button.action-btn:hover { background-color: #4338ca; }
        .audio-btn { background-color: #10b981; color: white; border: none; padding: 5px 15px; font-size: 14px; border-radius: 5px; cursor: pointer; margin-left: 10px; display: inline-flex; }
        .result-box { margin-top: 25px; padding: 15px; background-color: #121620; border-radius: 8px; border-left: 5px solid #10b981; text-align: left; direction: ltr; display: none; white-space: pre-line; line-height: 1.6; }
        .book-container { background-color: #0f172a; border: 1px solid #3f4451; border-radius: 8px; padding: 15px; margin-bottom: 15px; max-height: 200px; overflow-y: auto; text-align: left; direction: ltr; }
        .word-chip { display: inline-block; background-color: #1e293b; color: #cbd5e1; padding: 5px 10px; margin: 3px; border-radius: 15px; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>المساعد والقاموس الشامل 📖🗣️</h2>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('checker')">تصحيح الجمل</button>
            <button class="tab-btn" onclick="switchTab('dictionary')">القاموس</button>
        </div>

        <div id="checkerSection" class="content-section active">
            <textarea id="userInput" placeholder="Type sentence... e.g., I went to school tomorrow"></textarea>
            <button class="action-btn" onclick="analyzeText()">Analyze & Correct</button>
            <div id="checkerResult" class="result-box"></div>
        </div>

        <div id="dictionarySection" class="content-section">
            <div class="book-container"><div id="bookWords"></div></div>
            <input type="text" id="wordInput" placeholder="Type word...">
            <button class="action-btn" onclick="searchWord()">Search & Translate</button>
            <div id="dictionaryResult" class="result-box"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            if(tabName === 'checker') { document.querySelectorAll('.tab-btn')[0].classList.add('active'); document.getElementById('checkerSection').classList.add('active'); }
            else { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('dictionarySection').classList.add('active'); }
        }

        function playAudio(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        async function analyzeText() {
            const userInput = document.getElementById("userInput").value.trim();
            const resultBox = document.getElementById("checkerResult");
            if (!userInput) return;
            resultBox.style.display = "block";
            resultBox.innerHTML = "Analyzing...";

            // 1. محقق الأزمنة (المنطق)
            const lower = userInput.toLowerCase();
            if ((lower.includes("went") || lower.includes("did")) && lower.includes("tomorrow")) {
                const corrected = userInput.replace(/went/gi, "will go").replace(/did/gi, "will");
                resultBox.innerHTML = `<strong>Correction:</strong> ${corrected} <button class="audio-btn" onclick="playAudio('${corrected}')">🔊 Listen</button>`;
                return;
            }

            // 2. محقق القواعد (API)
            try {
                const response = await fetch("https://api.languagetool.org/v2/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ text: userInput, language: "en-US", level: "picky" })
                });
                const data = await response.json();
                if (data.matches.length > 0) {
                    const corr = data.matches[0].replacements[0]?.value || "Check grammar";
                    resultBox.innerHTML = `<strong>Correction:</strong> ${corr} <button class="audio-btn" onclick="playAudio('${corr}')">🔊 Listen</button>`;
                } else {
                    resultBox.innerHTML = `✨ Perfect! <button class="audio-btn" onclick="playAudio('${userInput}')">🔊 Listen</button>`;
                }
            } catch (e) { resultBox.innerHTML = "Connection Error."; }
        }

        async function searchWord(wordFromBook = null) {
            const word = wordFromBook || document.getElementById("wordInput").value.trim();
            const resultBox = document.getElementById("dictionaryResult");
            if (!word) return;
            resultBox.style.display = "block";
            resultBox.innerHTML = "Searching...";
            
            try {
                const [arRes, enRes] = await Promise.all([
                    fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
                ]);
                const def = enRes ? enRes[0].meanings[0].definitions[0].definition : "No definition found.";
                resultBox.innerHTML = `<strong>${word}</strong> <button class="audio-btn" onclick="playAudio('${word}')">🔊 Listen</button><br>
                <strong>Arabic:</strong> ${arRes.responseData.translatedText}<br>
                <strong>English:</strong> ${def}`;
            } catch (e) { resultBox.innerHTML = "Could not find word."; }
        }

        const words = ["Achieve", "Ambiguous", "Benevolent", "Breathtaking", "Candid", "Crucial", "Diligent", "Eloquent", "Fascinating", "Flawless", "Genuine", "Impeccable", "Inevitable", "Jubilant", "Lucrative", "Mitigate", "Obsolete", "Pragmatic", "Resilient", "Scrutinize", "Tremendous", "Ubiquitous", "Vulnerable", "Zealous"];
        words.sort().forEach(w => {
            const span = document.createElement("span"); span.className = "word-chip"; span.innerText = w;
            span.onclick = () => searchWord(w);
            document.getElementById("bookWords").appendChild(span);
        });
    </script>
</body>
</html>
