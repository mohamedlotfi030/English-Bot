<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المساعد والقاموس التعليمي</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    textarea, input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #0f172a; display: none; border-right: 5px solid #5850ec; text-align: left; direction: ltr; }
    .word-chip { display: inline-block; background: #334155; padding: 6px 12px; margin: 3px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .word-chip:hover { background: #5850ec; }
    .label { color: #5850ec; font-weight: bold; display: block; margin-top: 10px; }
    .audio-group { margin-top: 10px; display: flex; gap: 5px; }
    .audio-btn { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .audio-btn:hover { background: #5850ec; }
  </style>
</head>
<body>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('checker')">التصحيح</button>
      <button class="tab-btn" onclick="switchTab('dictionary')">القاموس</button>
    </div>

    <!-- قسم التصحيح -->
    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="اكتب الجملة هنا..."></textarea>
      <button class="action-btn" onclick="analyzeText()">تحليل وتصحيح</button>
      <div id="checkerResult" class="result-box"></div>
    </div>

    <!-- قسم القاموس -->
    <div id="dictionarySection" class="content-section">
      <div id="bookWords" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #475569; padding-bottom: 10px;"></div>
      <input type="text" id="wordInput" placeholder="ابحث عن كلمة...">
      <button class="action-btn" onclick="searchWord()">بحث وترجمة</button>
      <div id="dictionaryResult" class="result-box"></div>
    </div>
  </div>

  <script>
    // --- وظائف النطق (Speech Engine) ---
    function speak(text, lang) {
        const u = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        // محاولة اختيار صوت حسب اللهجة المطلوبة
        u.voice = voices.find(v => v.lang.includes(lang)) || voices[0];
        u.lang = lang;
        window.speechSynthesis.speak(u);
    }

    function getAudioButtons(text) {
        return `<div class="audio-group">
                    <button class="audio-btn" onclick="speak('${text}', 'en-US')">🔊 US Accent</button>
                    <button class="audio-btn" onclick="speak('${text}', 'en-GB')">🔊 UK Accent</button>
                </div>`;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(tab === 'checker' ? 'التصحيح' : 'القاموس')));
      document.querySelectorAll('.content-section').forEach(s => s.classList.toggle('active', s.id === tab + 'Section'));
    }

    // --- تحليل النصوص ---
    async function analyzeText() {
      const input = document.getElementById("userInput").value.trim();
      const box = document.getElementById("checkerResult");
      if (!input) return;
      box.style.display = "block";
      box.innerHTML = "⏳ جاري التحقق...";

      const lowerInput = input.toLowerCase();
      let correctedText = input;

      // منطق تصحيح يدوي
      if (lowerInput.includes("tomorrow") && (lowerInput.includes("went") || lowerInput.includes("did"))) {
          correctedText = input.replace(/went/gi, "will go").replace(/did/gi, "will do");
      } else if (lowerInput.includes("yesterday") && lowerInput.includes("will")) {
          correctedText = input.replace(/will go/gi, "went").replace(/will do/gi, "did").replace(/will/gi, "");
      }

      box.innerHTML = `<strong>Correction:</strong><br>${correctedText} ${getAudioButtons(correctedText)}`;
    }

    // --- القاموس الكامل ---
    async function searchWord(w = null) {
      const word = w || document.getElementById("wordInput").value.trim();
      const box = document.getElementById("dictionaryResult");
      if (!word) return;
      box.style.display = "block";
      box.innerHTML = "⏳ جاري البحث...";
      
      try {
        const [arRes, enRes] = await Promise.all([
          fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`).then(r => r.json()),
          fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null)
        ]);
        
        let def = "No definition found.";
        let example = "";
        if (enRes && enRes[0]) {
          def = enRes[0].meanings[0].definitions[0].definition;
          example = enRes[0].meanings[0].definitions[0].example || "No example in database.";
        }

        box.innerHTML = `<strong>${word}</strong><br>
                         <span class="label">Arabic:</span> ${arRes.responseData.translatedText}<br>
                         <span class="label">English Meaning:</span> ${def}<br>
                         <span class="label">Example:</span> "${example}"
                         ${getAudioButtons(word)}`;
      } catch(e) { box.innerHTML = "⚠️ لم يتم العثور على معلومات."; }
    }

    const words = ["Abandon","Achieve","Ambiguous","Benevolent","Capacity","Challenge","Dilemma","Diligent","Emerge","Eloquent","Framework","Fascinating","Generate","Genuine","Hypothesis","Impeccable","Initiative","Inevitable","Justify","Jubilant","Knowledgeable","Lucrative","Modify","Mitigate","Navigate","Notorious","Objective","Obsolete","Perceive","Pragmatic","Qualitative","Quarantine","Rational","Resilient","Subsequent","Scrutinize","Threshold","Tremendous","Ultimate","Ubiquitous","Validate","Vulnerable","Widespread","Zealous"];
    words.sort().forEach(w => {
      const s = document.createElement("span");
      s.className = "word-chip";
      s.innerText = w;
      s.onclick = () => searchWord(w);
      document.getElementById("bookWords").appendChild(s);
    });
  </script>
</body>
</html>
