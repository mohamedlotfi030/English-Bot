<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المساعد والقاموس الذكي</title>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: auto; background-color: #1e293b; padding: 25px; border-radius: 16px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; background: #334155; border: none; color: #cbd5e1; padding: 12px; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #5850ec; color: white; }
    .content-section { display: none; }
    .content-section.active { display: block; }
    textarea, input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    .action-btn { background: #5850ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #0f172a; display: none; border-right: 5px solid #5850ec; }
    .small-btn { background: #334155; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('checker')">التصحيح</button>
      <button class="tab-btn" onclick="switchTab('dictionary')">القاموس</button>
    </div>

    <div id="checkerSection" class="content-section active">
      <textarea id="userInput" rows="4" placeholder="اكتب الجملة هنا..."></textarea>
      <button class="action-btn" onclick="analyzeText()">تحليل وتصحيح</button>
      <div id="checkerResult" class="result-box"></div>
    </div>

    <div id="dictionarySection" class="content-section">
      <input type="text" id="wordInput" placeholder="ابحث عن كلمة...">
      <button class="action-btn" onclick="searchWord()">بحث وترجمة</button>
      <div id="dictionaryResult" class="result-box"></div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(tab === 'checker' ? 'التصحيح' : 'القاموس')));
      document.querySelectorAll('.content-section').forEach(s => s.classList.toggle('active', s.id === tab + 'Section'));
    }

    function playAudio(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      window.speechSynthesis.speak(u);
    }

    async function analyzeText() {
      const input = document.getElementById("userInput").value.trim();
      const box = document.getElementById("checkerResult");
      if (!input) return;
      box.style.display = "block";
      box.innerHTML = "⏳ جاري التحقق من المنطق...";

      const lowerInput = input.toLowerCase();
      let correctedText = input;

      // --- محرك المنطق الذكي (Logic Engine) ---
      // تصحيح: ماضي + tomorrow (مستقبل)
      if (lowerInput.includes("tomorrow") && (lowerInput.includes("went") || lowerInput.includes("did"))) {
          correctedText = input.replace(/went/gi, "will go").replace(/did/gi, "will do");
      } 
      // تصحيح: مستقبل + yesterday (ماضي)
      else if (lowerInput.includes("yesterday") && lowerInput.includes("will")) {
          correctedText = input.replace(/will go/gi, "went").replace(/will do/gi, "did").replace(/will/gi, "");
      }
      // تصحيح: فاعل مفرد + are
      else if (lowerInput.includes("he are") || lowerInput.includes("she are") || lowerInput.includes("it are")) {
          correctedText = input.replace(/are/gi, "is");
      }

      // إذا حدث تصحيح يدوي نعرضه فوراً
      if (correctedText !== input) {
          box.innerHTML = `<strong>النص المصحح:</strong><br>${correctedText}<br>
            <button class="small-btn" onclick="playAudio('${correctedText}')">🔊 استمع</button>`;
          return;
      }

      // إذا لم يكن هناك خطأ منطقي، نستخدم API
      try {
        const res = await fetch("https://api.languagetool.org/v2/check", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ text: input, language: "en-US", level: "picky" })
        });
        const data = await res.json();
        
        if (data.matches && data.matches.length > 0) {
          data.matches.sort((a, b) => b.offset - a.offset).forEach(match => {
            if (match.replacements.length > 0) {
              correctedText = correctedText.substring(0, match.offset) + match.replacements[0].value + correctedText.substring(match.offset + match.length);
            }
          });
          box.innerHTML = `<strong>النص المصحح:</strong><br>${correctedText}<br><button class="small-btn" onclick="playAudio('${correctedText}')">🔊 استمع</button>`;
        } else {
          box.innerHTML = "✨ النص سليم منطقياً وقواعدياً.";
        }
      } catch(e) { box.innerHTML = "⚠️ خطأ في الاتصال."; }
    }

    async function searchWord(w = null) {
      const word = w || document.getElementById("wordInput").value.trim();
      const box = document.getElementById("dictionaryResult");
      if (!word) return;
      box.innerHTML = "⏳ جاري البحث...";
      try {
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ar`);
        const data = await res.json();
        box.style.display = "block";
        box.innerHTML = `<strong>${word}</strong><br>العربية: ${data.responseData.translatedText}<br>
                         <button class="small-btn" onclick="playAudio('${word}')">🔊 استمع</button>`;
      } catch(e) { box.innerHTML = "⚠️ لم يتم العثور على الكلمة."; }
    }
  </script>
</body>
</html>
